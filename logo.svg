  <line x1="128" y1="82" x2="71" y2="57" stroke="#d8e5ef" stroke-width="8" stroke-linecap="round"/>
  <line x1="128" y1="82" x2="189" y2="95" stroke="#d8e5ef" stroke-width="8" stroke-linecap="round"/>
  <line x1="128" y1="82" x2="120" y2="24" stroke="#d8e5ef" stroke-width="8" stroke-linecap="round"/>

  <path d="M128 82 C126 65, 136 48, 149 38"
