  <path d="M120 186 L136 186 L132 82 L124 82 Z" fill="url(#steel)"/>
  <ellipse cx="128" cy="186" rx="18" ry="5.5" fill="#7b93a8" opacity="0.9"/>

  <path d="M128 186 C125 170, 121 153, 122 135 C123 118, 130 101, 139 86"
