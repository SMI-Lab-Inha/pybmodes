  <circle cx="128" cy="82" r="11" fill="#9cf7ef"/>
  <circle cx="128" cy="82" r="5" fill="#0f2436"/>

  <text x="128" y="226" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="28" font-weight="700" letter-spacing="0.5">
    <tspan fill="#9cf7ef">py</tspan><tspan fill="#f3f7fb">bmodes</tspan>
