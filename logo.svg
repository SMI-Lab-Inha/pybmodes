<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#14324a"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e7f0f7"/>
      <stop offset="100%" stop-color="#93a8bb"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#57f0cf"/>
      <stop offset="100%" stop-color="#2cc2ff"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="256" height="256" rx="36" fill="url(#bg)"/>

  <circle cx="128" cy="110" r="72" fill="none" stroke="#214763" stroke-width="1.5"/>
